<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart NLP Chatbot</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-robot text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-wide">NLP Bot</h1>
            </div>

            <div class="flex flex-col gap-4">
                <button id="clear-chat-btn" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all text-sm">
                    <i class="fa-solid fa-trash-can text-indigo-400"></i>
                    Clear Conversation
                </button>
            </div>

            <div class="mt-auto pt-6 border-t border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center">
                        <i class="fa-solid fa-user text-xs"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-sm font-medium">Guest User</span>
                        <div class="status-badge mt-1">
                            <div class="status-dot"></div>
                            Online
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-chat glass">
            
            <!-- Header -->
            <header class="chat-header">
                <div class="flex flex-col">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        University Assistant
                        <span class="bg-indigo-500/20 text-indigo-300 text-xs px-2 py-0.5 rounded border border-indigo-500/30">AI</span>
                    </h2>
                    <p class="text-xs text-slate-400">Powered by NLTK & Logistic Regression</p>
                </div>
                <div class="flex gap-2">
                    <button class="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-ellipsis-vertical text-slate-300"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <div id="messages-container" class="messages-container">
                
                <!-- Welcome Message -->
                <div class="message bot">
                    <p>Hello! 👋 I'm your University Smart Assistant. I can help you with admission queries, courses, fees, and more. How can I assist you today?</p>
                </div>

                <!-- Typing Indicator (Hidden by default) -->
                <div id="typing-indicator" class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>

            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <i class="fa-solid fa-message text-slate-400"></i>
                    <input type="text" id="message-input" placeholder="Type your message here..." autocomplete="off">
                    <button id="send-btn" class="send-btn">
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                    </button>
                </div>
                <div class="text-center mt-2">
                    <p class="text-[10px] text-slate-500">AI can make mistakes. Verify important university information.</p>
                </div>
            </div>

        </main>
    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
